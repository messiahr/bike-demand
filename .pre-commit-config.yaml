repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.19
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi, pyproject]
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]

  # Mypy — must run in your project environment via uv
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy . --ignore-missing-imports
        language: system
        types: [python]
        pass_filenames: false
